# actionlint configuration
# https://github.com/rhysd/actionlint/blob/main/docs/config.md
#
# Shellcheck integration is disabled: actionlint runs shellcheck on every
# inline `run:` script, but those scripts use ${{ }} expressions that
# shellcheck flags as unquoted variables (SC2086) and style nits (SC2129,
# SC2001). Suppressing shellcheck here keeps the signal-to-noise ratio high —
# shellcheck runs separately on the composite action scripts where it is
# more useful (see ci.yml shellcheck job, scandir: ./actions).
self-hosted-runner:
  labels: []

# Disable shellcheck integration globally
shellcheck:
  enable: false
