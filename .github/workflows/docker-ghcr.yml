name: Reusable Docker Build & Push to GHCR

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Image name override (defaults to ghcr.io/{repo})'
        required: false
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      context:
        description: 'Docker build context'
        required: false
        type: string
        default: '.'
      build-args:
        description: 'Docker build arguments (newline-separated)'
        required: false
        type: string
      push:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: true
      platforms:
        description: 'Target platforms'
        required: false
        type: string
        default: 'linux/amd64'
      version:
        description: 'Semantic version to tag (e.g. 1.2.3). When set, adds vX.Y.Z, vX.Y, vX tags.'
        required: false
        type: string
        default: ''
      provenance:
        description: >-
          BuildKit provenance attestation for pushed images: 'mode=max',
          'mode=min', 'true', or 'false'. SLSA-aligned supply-chain metadata;
          no extra caller permissions needed.
        required: false
        type: string
        default: 'mode=max'
      whats-new-path:
        description: >-
          Bake the latest release's whats-new.json into the build context at
          this path (relative to repo root, e.g. public/whats-new.json) before
          the image is built. Empty disables. See the What's-New section of
          the README.
        required: false
        type: string
        default: ''
    outputs:
      tags:
        description: 'Generated image tags'
        value: ${{ jobs.build.outputs.tags }}
      digest:
        description: 'Image digest'
        value: ${{ jobs.build.outputs.digest }}
    secrets:
      node-auth-token:
        description: 'Token for installing private GitHub Packages (npm) deps during the build. Optional.'
        required: false

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute semver tags
        id: semver
        if: inputs.version != ''
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ inputs.version }}"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"
          echo "full=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ inputs.image-name || format('ghcr.io/{0}', github.repository) }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ steps.semver.outputs.full }},enable=${{ inputs.version != '' }}
            type=raw,value=v${{ steps.semver.outputs.minor }},enable=${{ inputs.version != '' }}
            type=raw,value=v${{ steps.semver.outputs.major }},enable=${{ inputs.version != '' }}

      - name: Inject what's-new summary
        if: inputs.whats-new-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ inputs.whats-new-path }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${TARGET}")"
          if gh release download --repo "${{ github.repository }}" --pattern 'whats-new.json' --output "${TARGET}" --clobber 2>/dev/null; then
            echo "Injected what's-new summary at ${TARGET}"
          else
            echo "::notice title=whats-new::No whats-new.json asset on the latest release — skipping injection. The app should handle the file being absent."
          fi

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          provenance: ${{ inputs.provenance }}
          build-args: ${{ inputs.build-args }}
          secrets: |
            node_auth_token=${{ secrets.node-auth-token }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
