name: Reusable Docker Build & Push to GHCR

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Image name override (defaults to ghcr.io/{repo})'
        required: false
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      context:
        description: 'Docker build context'
        required: false
        type: string
        default: '.'
      build-args:
        description: 'Docker build arguments (newline-separated)'
        required: false
        type: string
      push:
        description: 'Push image to registry'
        required: false
        type: boolean
        default: true
      platforms:
        description: 'Target platforms'
        required: false
        type: string
        default: 'linux/amd64'
      version:
        description: 'Semantic version to tag (e.g. 1.2.3). When set, adds vX.Y.Z, vX.Y, vX tags.'
        required: false
        type: string
        default: ''
      provenance:
        description: >-
          BuildKit provenance attestation for pushed images: 'mode=max',
          'mode=min', 'true', or 'false'. SLSA-aligned supply-chain metadata;
          no extra caller permissions needed.
        required: false
        type: string
        default: 'mode=max'
      whats-new-path:
        description: >-
          Bake a whats-new.json into the build context at this path (relative
          to repo root, e.g. public/whats-new.json) before the image is built.
          Prefers the release matching the version input; falls back to the
          latest release. Empty disables. See the What's-New section of the
          README.
        required: false
        type: string
        default: ''
      attest:
        description: >-
          Generate and push a SLSA build-provenance attestation for the pushed
          image. Requires the calling workflow to grant
          `id-token: write` and `attestations: write` permissions. Only takes
          effect when `push` is also true. Default: false.
        required: false
        type: boolean
        default: false
    outputs:
      tags:
        description: 'Generated image tags'
        value: ${{ jobs.build.outputs.tags }}
      digest:
        description: 'Image digest'
        value: ${{ jobs.build.outputs.digest }}
    secrets:
      node-auth-token:
        description: 'Token for installing private GitHub Packages (npm) deps during the build. Optional.'
        required: false

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute semver tags
        id: semver
        if: inputs.version != ''
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ inputs.version }}"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"
          echo "full=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ inputs.image-name || format('ghcr.io/{0}', github.repository) }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ steps.semver.outputs.full }},enable=${{ inputs.version != '' }}
            type=raw,value=v${{ steps.semver.outputs.minor }},enable=${{ inputs.version != '' }}
            type=raw,value=v${{ steps.semver.outputs.major }},enable=${{ inputs.version != '' }}

      - name: Inject what's-new summary
        if: inputs.whats-new-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ inputs.whats-new-path }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${TARGET}")"
          # When a version is being built, bake ONLY that version's summary —
          # never fall back to latest, which would give an older ref a newer
          # release's notes (the rollback case). Latest is used only for
          # unversioned builds.
          if [ -n "${{ inputs.version }}" ]; then
            if gh release download "v${{ inputs.version }}" --repo "${{ github.repository }}" --pattern 'whats-new.json' --output "${TARGET}" --clobber; then
              echo "Injected what's-new summary for v${{ inputs.version }} at ${TARGET}"
            else
              echo "::notice title=whats-new::No whats-new.json for v${{ inputs.version }} (release missing, or cut before this feature) — skipping injection rather than baking a mismatched summary."
            fi
          elif gh release download --repo "${{ github.repository }}" --pattern 'whats-new.json' --output "${TARGET}" --clobber; then
            echo "Injected what's-new summary (latest release) at ${TARGET}"
          else
            echo "::notice title=whats-new::No whats-new.json asset found (note: drafts/prereleases are not considered) — skipping injection. The app should handle the file being absent."
          fi

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          provenance: ${{ inputs.provenance }}
          build-args: ${{ inputs.build-args }}
          secrets: |
            node_auth_token=${{ secrets.node-auth-token }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Derive image name for attestation
        id: attest-name
        if: inputs.attest && inputs.push
        env:
          IMAGE_NAME: ${{ inputs.image-name || format('ghcr.io/{0}', github.repository) }}
        run: |
          set -euo pipefail
          echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        if: inputs.attest && inputs.push
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.attest-name.outputs.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true
