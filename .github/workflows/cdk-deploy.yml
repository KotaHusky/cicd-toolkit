name: CDK Deploy

on:
  workflow_call:
    inputs:
      aws-region:
        description: AWS region
        required: false
        type: string
        default: 'us-east-1'
      node-version:
        description: Node.js version
        required: false
        type: string
        default: '24'
      pre-build-filter:
        description: 'Turbo filter for packages to build before deploy (e.g. @my-org/shared)'
        required: false
        type: string
        default: ''
      cdk-context:
        description: 'CDK context flags (space-separated key=value pairs)'
        required: true
        type: string
      stacks:
        description: 'Stacks to deploy (default: --all)'
        required: false
        type: string
        default: '--all'
      concurrency:
        description: 'Max parallel stack deployments (default: 1)'
        required: false
        type: number
        default: 1
      method:
        description: 'Deploy method: change-set (safe, default) or direct (faster, no rollback)'
        required: false
        type: string
        default: 'change-set'
      hotswap:
        description: 'Hotswap mode: off (default), fallback (try hotswap, fall back to CFN), or force (hotswap only)'
        required: false
        type: string
        default: 'off'
      run-diff:
        description: 'Run cdk diff before deploy'
        required: false
        type: boolean
        default: true
      recover-stacks:
        description: 'Recover stuck CloudFormation stacks before deploy'
        required: false
        type: boolean
        default: true
      stack-prefix:
        description: 'Stack name prefix for recovery (required if recover-stacks is true)'
        required: false
        type: string
        default: ''
      checkout-ref:
        description: 'Git ref to checkout (defaults to triggering ref)'
        required: false
        type: string
        default: ''
      environment:
        description: >-
          GitHub environment name (in the calling repo) to apply to the deploy
          job. Enables environment protection rules (approvals, wait timers) and
          environment-scoped secrets. Requires the caller to pass
          `secrets: inherit`. Empty = no environment.
        required: false
        type: string
        default: ''
      track-deployment:
        description: >-
          Create a GitHub Deployment record (DORA raw data). When true, a
          Deployment is opened before the deploy and a deployment_status of
          success/failure is posted after. Both steps are best-effort
          (continue-on-error: true) so tracking never breaks a deploy.
          Requires the caller's job to have `deployments: write` permission —
          add it to the calling workflow's job permissions block.
        required: false
        type: boolean
        default: false
    secrets:
      role-arn:
        description: 'IAM role ARN for AWS authentication'
        required: true
    outputs:
      stacks-deployed:
        description: 'Whether the deployment succeeded'
        value: ${{ jobs.deploy.outputs.deployed }}

concurrency:
  group: cdk-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.environment }}
    outputs:
      deployed: ${{ steps.deploy.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - uses: KotaHusky/cicd-toolkit/actions/turbo-setup@main
        with:
          node-version: ${{ inputs.node-version }}
          pre-build-filter: ${{ inputs.pre-build-filter }}

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Recover stuck stacks
        if: inputs.recover-stacks && inputs.stack-prefix != ''
        uses: KotaHusky/cicd-toolkit/actions/cfn-recover@main
        with:
          stack-prefix: ${{ inputs.stack-prefix }}

      - name: Build CDK context flags
        id: context
        shell: bash
        run: |
          CONTEXT_FLAGS=""
          # Word-splitting is intentional: cdk-context is a space-separated
          # list of key=value pairs and we want each pair as its own token.
          # shellcheck disable=SC2086
          for PAIR in ${{ inputs.cdk-context }}; do
            CONTEXT_FLAGS="${CONTEXT_FLAGS} -c ${PAIR}"
          done
          echo "flags=${CONTEXT_FLAGS}" >> "$GITHUB_OUTPUT"

      # Synth once, reuse for diff + deploy (avoids double synthesis)
      - name: CDK synth
        run: npx cdk synth --quiet ${{ steps.context.outputs.flags }} -o cdk.deploy.out

      - name: CDK diff
        if: inputs.run-diff
        run: npx cdk diff --app cdk.deploy.out || true

      - name: Create GitHub Deployment (DORA tracking)
        id: gh-deploy
        if: inputs.track-deployment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_ENV: ${{ inputs.environment || 'production' }}
          DEPLOY_REF: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Callers must grant `deployments: write` on their job; without it
          # this step is skipped gracefully via continue-on-error.
          DEPLOY_ID=$(gh api "repos/${REPO}/deployments" \
            -f ref="${DEPLOY_REF}" \
            -f environment="${DEPLOY_ENV}" \
            -F auto_merge=false \
            -f required_contexts='[]' \
            -f description='CDK deploy started' \
            --jq '.id')
          echo "deployment-id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Deployment tracking::Created GitHub Deployment ${DEPLOY_ID} for ${DEPLOY_ENV}. Requires deployments: write on the calling job."

      - name: CDK deploy
        id: deploy
        shell: bash
        run: |
          HOTSWAP_FLAG=""
          if [ "${{ inputs.hotswap }}" = "fallback" ]; then
            HOTSWAP_FLAG="--hotswap-fallback"
          elif [ "${{ inputs.hotswap }}" = "force" ]; then
            HOTSWAP_FLAG="--hotswap"
          fi

          npx cdk deploy --app cdk.deploy.out ${{ inputs.stacks }} \
            --require-approval never \
            --concurrency ${{ inputs.concurrency }} \
            --method=${{ inputs.method }} \
            ${HOTSWAP_FLAG}

      - name: Post GitHub Deployment status (DORA tracking)
        if: always() && inputs.track-deployment && steps.gh-deploy.outputs.deployment-id != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DEPLOY_ID: ${{ steps.gh-deploy.outputs.deployment-id }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          set -euo pipefail
          STATE="failure"
          if [ "${DEPLOY_OUTCOME}" = "success" ]; then
            STATE="success"
          fi
          gh api "repos/${REPO}/deployments/${DEPLOY_ID}/statuses" \
            -f state="${STATE}" \
            -f description="CDK deploy ${STATE}"
          echo "::notice title=Deployment tracking::Posted deployment_status=${STATE} for deployment ${DEPLOY_ID}."
