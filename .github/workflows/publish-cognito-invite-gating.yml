name: Publish @kotahusky/cognito-invite-gating

on:
  push:
    tags:
      - 'cognito-invite-gating/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0). Defaults to version in package.json.'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/invite-gating

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kotahusky'

      - name: Install dependencies
        run: npm ci

      - name: Build (Lambda ZIPs + TypeScript)
        run: npm run build

      - name: Resolve publish version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Extract semver from tag, e.g. cognito-invite-gating/v1.2.0 → 1.2.0
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#cognito-invite-gating/v}"
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
              echo "::error::Tag '$TAG' does not encode a valid semver after prefix strip (got '$VERSION')"
              exit 1
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.version.outputs.version != ''
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
