name: Reusable Build Verification

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '24'
      run-build:
        description: 'Run the build step'
        required: false
        type: boolean
        default: true
      run-tests:
        description: 'Run the test step'
        required: false
        type: boolean
        default: true
      run-lint:
        description: 'Run the lint step'
        required: false
        type: boolean
        default: true
      package-manager:
        description: 'Package manager (npm or pnpm)'
        required: false
        type: string
        default: 'npm'
      claude-review:
        description: >-
          Run an advisory Claude AI review on pull requests. Activates only
          when an Anthropic secret is provided; skips silently otherwise.
        required: false
        type: boolean
        default: true
      require-resolved-review-threads:
        description: >-
          Add a status check that fails while the PR has unresolved review
          threads, forcing findings to be dispositioned before merge.
          Advisory unless the caller marks the check required.
        required: false
        type: boolean
        default: true
      claude-review-prompt:
        description: 'Extra project-specific review instructions appended to the default review prompt'
        required: false
        type: string
        default: ''
      review-test-gaps:
        description: 'Also analyze test coverage of the changed lines — flags changed code paths whose tests were not updated'
        required: false
        type: boolean
        default: false
    secrets:
      node-auth-token:
        description: 'Token for installing private GitHub Packages (npm) deps. Optional.'
        required: false
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key for the Claude review. Optional — review is skipped without credentials.'
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        description: 'Claude Pro/Max OAuth token for the Claude review. Optional — review is skipped without credentials.'
        required: false

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Restore node_modules
        id: cache
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.node-auth-token }}

      - name: Save node_modules cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}

  build:
    name: Build
    needs: install
    if: ${{ inputs.run-build }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Turbo remote cache
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      - name: Build
        run: npx turbo run build

  test:
    name: Test
    needs: install
    if: ${{ inputs.run-tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Turbo remote cache
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      - name: Test
        run: npx turbo run test

  lint:
    name: Lint
    needs: install
    if: ${{ inputs.run-lint }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}

      - name: Restore node_modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Turbo remote cache
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      - name: Lint
        run: npx turbo run lint

  claude-review:
    # Advisory AI review — designed to never break a consumer build:
    # no job-level permissions block (inherits the caller's grant, so no
    # plan-time permission failures), a credential gate that skips with a
    # notice, and continue-on-error on the review itself. If the caller's
    # token lacks pull-requests: write, the review degrades to a skip.
    name: Claude Review
    if: >-
      ${{ inputs.claude-review &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.type != 'Bot' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check for Anthropic credentials
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "${ANTHROPIC_API_KEY}" ] || [ -n "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "has-credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-credentials=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Claude review skipped::No ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN secret reached build-verify. Pass one via 'secrets:' (or 'secrets: inherit') to enable AI review, or set 'claude-review: false' to silence this notice. Note: PRs from forks never receive secrets, so this is expected there."
          fi

      - name: Checkout code
        if: steps.gate.outputs.has-credentials == 'true'
        uses: actions/checkout@v7

      - name: Run Claude Code review (advisory)
        if: steps.gate.outputs.has-credentials == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for:
            - Correctness bugs and unhandled edge cases
            - Security issues (injection, secrets handling, authz)
            - Significant performance problems
            - Clarity or maintainability issues worth fixing now

            Be concise and high-signal; skip nitpicks and style preferences.
            Use inline comments for line-specific findings, then post a short
            summary (overall assessment plus any blocking items).

            ${{ inputs.claude-review-prompt }}
            ${{ inputs.review-test-gaps && 'Additionally, analyze test coverage of this diff: identify changed or added code paths with no corresponding test updates in the PR. Report only the 3 most important gaps, each as file:line plus the specific missing test case. If coverage looks adequate, say so in one line.' || '' }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
            --max-turns 25

  review-threads:
    # See claude-review.yml's twin job: dispositions review findings before
    # merge. Ordered after the embedded review so its threads are counted;
    # "Re-run failed jobs" re-runs only this gate after resolving.
    name: Review Threads Resolved
    needs: claude-review
    if: >-
      ${{ always() && inputs.require-resolved-review-threads &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.type != 'Bot' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check for unresolved review threads
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          set +e
          # --paginate + --slurp walks all pages, so >100 threads can't
          # silently false-pass the gate. gh rejects --slurp combined with
          # --jq, so the response is parsed with standalone jq below.
          # stderr is captured separately so a benign warning from a
          # successful call can't poison the jq parse and fail the gate.
          RAW=$(gh api graphql --paginate --slurp \
              -f owner="${{ github.repository_owner }}" \
              -f repo="${{ github.event.repository.name }}" \
              -F pr="${{ github.event.pull_request.number }}" \
              -f query='query($owner: String!, $repo: String!, $pr: Int!, $endCursor: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $endCursor) {
                      pageInfo { hasNextPage endCursor }
                      nodes { isResolved }
                    }
                  }
                }
              }' 2>/tmp/threads-err.txt)
          STATUS=$?
          if [ "$STATUS" -eq 0 ]; then
            THREADS=$(printf '%s' "$RAW" | jq '[.[].data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved | not)] | length' 2>>/tmp/threads-err.txt)
            STATUS=$?
          fi
          set -e
          if [ "$STATUS" -ne 0 ]; then
            ERR=$(cat /tmp/threads-err.txt 2>/dev/null || true)
            # Fail open ONLY on permission errors (restricted token); fail
            # closed on anything else (5xx, rate limit) so a consumer who
            # requires this check never gets false assurance — re-run fixes
            # transient failures. GraphQL-level errors can land on either
            # stream, so both are checked.
            if printf '%s\n%s' "$ERR" "$RAW" | grep -qiE 'resource not accessible|forbidden|permission'; then
              echo "::notice title=Review threads::Token lacks permission to read review threads — skipping the gate. Grant the calling job pull-requests: read (or write) to enable it."
              exit 0
            fi
            echo "::error title=Review threads::Could not query review threads (transient error?) — re-run this job. Error: ${ERR:-$RAW}"
            exit 1
          fi
          if [ "$THREADS" -gt 0 ]; then
            echo "::error title=Unresolved review threads::${THREADS} review thread(s) are unresolved on this PR. Disposition each — push a fix, or reply explaining why it's dismissed — then resolve it and re-run this check (Re-run failed jobs re-runs only this gate, not the review)."
            exit 1
          fi
          echo "All review threads resolved (or none exist)."
