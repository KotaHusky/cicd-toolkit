name: Reusable PR Preview Deploy (S3 + CloudFront)

on:
  workflow_call:
    inputs:
      bucket-name:
        description: 'S3 bucket that hosts the site (previews are written under previews/pr-<num>/)'
        required: true
        type: string
      distribution-id:
        description: 'CloudFront distribution ID for cache invalidation'
        required: true
        type: string
      preview-domain:
        description: 'CloudFront domain the preview is reachable on (e.g. d1234.cloudfront.net or preview.example.com)'
        required: true
        type: string
      aws-region:
        description: 'AWS region for the S3 bucket'
        required: false
        type: string
        default: 'us-east-1'
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '24'
      package-manager:
        description: 'Package manager (npm or pnpm)'
        required: false
        type: string
        default: 'npm'
      build-command:
        description: 'Command that produces the static output'
        required: false
        type: string
        default: 'npm run build'
      build-output-dir:
        description: 'Directory of build output to upload (relative to working-directory)'
        required: false
        type: string
        default: 'out'
      working-directory:
        description: 'Directory to run the build from'
        required: false
        type: string
        default: '.'
      build-args:
        description: 'Additional environment variables for the build step (KEY=VALUE per line). PREVIEW_BASE_PATH and PREVIEW_URL are always injected automatically.'
        required: false
        type: string
        default: ''
    secrets:
      role-arn:
        description: 'IAM role ARN for AWS authentication via OIDC'
        required: true
    outputs:
      preview-url:
        description: 'Full HTTPS URL of the deployed preview'
        value: ${{ jobs.preview.outputs.preview-url }}

# One concurrent run per PR per bucket — cancel in-progress deploys, keep teardowns.
# cancel-in-progress applies to the whole per-PR group: a new push cancels a
# stale deploy, and a close event cancels an in-flight deploy before tearing
# down — both are the desired outcomes.
concurrency:
  group: preview-${{ inputs.bucket-name }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  preview:
    name: ${{ github.event.action == 'closed' && 'Teardown preview' || 'Deploy preview' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    outputs:
      preview-url: ${{ steps.set-url.outputs.preview-url }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      # ------------------------------------------------------------------
      # Resolve PR number and derive the S3 prefix early so every later
      # step can reference shell variables (never raw ${{ }} in scripts).
      # ------------------------------------------------------------------
      - name: Compute preview coordinates
        id: coords
        shell: bash
        working-directory: '.'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUCKET: ${{ inputs.bucket-name }}
          DOMAIN: ${{ inputs.preview-domain }}
        run: |
          set -euo pipefail
          # Fail fast if PR number is empty (should never happen on pull_request events).
          if [ -z "${PR_NUMBER}" ]; then
            echo "::error::PR number is empty — this workflow must be triggered by a pull_request event."
            exit 1
          fi
          PREFIX="previews/pr-${PR_NUMBER}"
          # Guard: prefix must match exactly this pattern before any S3 operation.
          if ! echo "${PREFIX}" | grep -qE '^previews/pr-[0-9]+$'; then
            echo "::error::Computed S3 prefix '${PREFIX}' does not match expected pattern — aborting."
            exit 1
          fi
          PREVIEW_URL="https://${DOMAIN}/${PREFIX}/"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "preview-url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      # Fork PRs receive no repository secrets — the deploy would hard-fail
      # at AWS auth. Gate every subsequent step on the secret's presence and
      # skip with a notice instead (mirrors build-verify's credential gate).
      - name: Check deploy credentials
        id: gate
        shell: bash
        working-directory: '.'
        env:
          ROLE_ARN: ${{ secrets.role-arn }}
        run: |
          set -euo pipefail
          if [ -n "${ROLE_ARN}" ]; then
            echo "has-credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-credentials=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=preview::No role-arn secret reached this run (expected for fork PRs, which never receive secrets) — preview deploy skipped."
          fi

      - name: Set preview URL output
        id: set-url
        shell: bash
        working-directory: '.'
        env:
          PREVIEW_URL: ${{ steps.coords.outputs.preview-url }}
        run: |
          set -euo pipefail
          echo "preview-url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # DEPLOY PATH (opened / synchronize / reopened)
      # ------------------------------------------------------------------
      - uses: actions/checkout@v7
        if: github.event.action != 'closed' && steps.gate.outputs.has-credentials == 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # corepack must run before setup-node: its pnpm cache resolution
      # shells out to `pnpm store path`, which needs the corepack shim.
      - name: Enable corepack (pnpm)
        if: github.event.action != 'closed' && steps.gate.outputs.has-credentials == 'true' && inputs.package-manager == 'pnpm'
        shell: bash
        run: corepack enable
      - uses: actions/setup-node@v7
        if: github.event.action != 'closed' && steps.gate.outputs.has-credentials == 'true'
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/${{ inputs.package-manager == 'pnpm' && 'pnpm-lock.yaml' || 'package-lock.json' }}

      - name: Install dependencies
        if: github.event.action != 'closed' && steps.gate.outputs.has-credentials == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Export build environment variables
        if: github.event.action != 'closed' && steps.gate.outputs.has-credentials == 'true'
        shell: bash
        env:
          PREVIEW_BASE_PATH_VAL: ${{ steps.coords.outputs.prefix }}
          PREVIEW_URL_VAL: ${{ steps.coords.outputs.preview-url }}
          EXTRA_BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          set -euo pipefail
          # Inject preview path env vars — frameworks read these during the build
          # (e.g. Next.js: basePath: process.env.PREVIEW_BASE_PATH).
          echo "PREVIEW_BASE_PATH=/${PREVIEW_BASE_PATH_VAL}" >> "$GITHUB_ENV"
          echo "PREVIEW_URL=${PREVIEW_URL_VAL}" >> "$GITHUB_ENV"
          # Append any caller-supplied build args.
          if [ -n "${EXTRA_BUILD_ARGS}" ]; then
            while IFS= read -r LINE; do
              [ -z "$LINE" ] && continue
              echo "$LINE" >> "$GITHUB_ENV"
            done <<< "${EXTRA_BUILD_ARGS}"
          fi

      - name: Build
        if: github.event.action != 'closed' && steps.gate.outputs.has-credentials == 'true'
        shell: bash
        run: ${{ inputs.build-command }}

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        if: steps.gate.outputs.has-credentials == 'true'
        with:
          role-to-assume: ${{ secrets.role-arn }}
          aws-region: ${{ inputs.aws-region }}

      # Inherits the job's working-directory so build-output-dir resolves
      # relative to it (matching static-s3-deploy) — monorepo callers set
      # working-directory: apps/web and the output lands at apps/web/out.
      - name: Sync to S3
        if: github.event.action != 'closed' && steps.gate.outputs.has-credentials == 'true'
        id: sync
        shell: bash
        env:
          BUCKET: ${{ inputs.bucket-name }}
          PREFIX: ${{ steps.coords.outputs.prefix }}
          BUILD_OUTPUT_DIR: ${{ inputs.build-output-dir }}
        run: |
          set -euo pipefail
          # Guard prefix once more at the point of the S3 write.
          if ! echo "${PREFIX}" | grep -qE '^previews/pr-[0-9]+$'; then
            echo "::error::S3 prefix '${PREFIX}' failed safety check — aborting sync."
            exit 1
          fi
          # Sync the build output into this PR's prefix. --delete only removes
          # objects within this PR's prefix (no cross-prefix deletion).
          # Short, explicit cache policy: previews change on every push and
          # must never be heuristically cached by browsers or held 24h by
          # CloudFront's default TTL.
          aws s3 sync "${BUILD_OUTPUT_DIR}/" "s3://${BUCKET}/${PREFIX}/" \
            --delete \
            --cache-control "public, max-age=60, must-revalidate" \
            2>&1 | tee /tmp/sync.log
          COUNT=$({ grep -E '^(upload|copy|delete):' /tmp/sync.log || true; } | wc -l | tr -d ' ')
          echo "objects-synced=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Invalidate CloudFront cache (deploy)
        if: github.event.action != 'closed' && steps.gate.outputs.has-credentials == 'true'
        id: invalidate-deploy
        shell: bash
        working-directory: '.'
        env:
          DISTRIBUTION_ID: ${{ inputs.distribution-id }}
          PREFIX: ${{ steps.coords.outputs.prefix }}
        run: |
          set -euo pipefail
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/${PREFIX}/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation-id=${INV_ID}" >> "$GITHUB_OUTPUT"

      - name: Upsert sticky PR comment (deployed)
        if: github.event.action != 'closed' && steps.gate.outputs.has-credentials == 'true'
        continue-on-error: true
        shell: bash
        working-directory: '.'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.coords.outputs.preview-url }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          SHORT_SHA="${SHA:0:7}"
          BODY="<!-- preview-env -->
          ## Preview environment

          | | |
          |---|---|
          | **URL** | [${PREVIEW_URL}](${PREVIEW_URL}) |
          | **SHA** | \`${SHORT_SHA}\` |
          | **Deployed** | ${TIMESTAMP} |

          > Built from commit \`${SHORT_SHA}\`. Torn down automatically when the PR closes."

          # Find an existing comment with the sentinel marker.
          EXISTING_ID=$(gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select((.body // "") | startswith("<!-- preview-env -->")) | .id' \
            | head -n1 || true)

          if [ -n "${EXISTING_ID}" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              -X PATCH \
              -f body="${BODY}"
          else
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -X POST \
              -f body="${BODY}"
          fi || echo "::notice title=preview-comment::Could not post PR comment (missing pull-requests: write permission?). Preview URL: ${PREVIEW_URL}"

      # ------------------------------------------------------------------
      # TEARDOWN PATH (closed)
      # ------------------------------------------------------------------
      - name: Delete S3 prefix (teardown)
        id: teardown
        if: github.event.action == 'closed' && steps.gate.outputs.has-credentials == 'true'
        shell: bash
        working-directory: '.'
        env:
          BUCKET: ${{ inputs.bucket-name }}
          PREFIX: ${{ steps.coords.outputs.prefix }}
        run: |
          set -euo pipefail
          # Safety guard: never allow an empty or unexpected prefix to trigger
          # a runaway delete. The check must pass before any aws s3 rm call.
          if ! echo "${PREFIX}" | grep -qE '^previews/pr-[0-9]+$'; then
            echo "::error::S3 prefix '${PREFIX}' failed safety check — aborting teardown."
            exit 1
          fi
          aws s3 rm "s3://${BUCKET}/${PREFIX}/" --recursive
          echo "::notice title=preview-teardown::Removed s3://${BUCKET}/${PREFIX}/"

      - name: Invalidate CloudFront cache (teardown)
        if: github.event.action == 'closed' && steps.gate.outputs.has-credentials == 'true'
        id: invalidate-teardown
        shell: bash
        working-directory: '.'
        env:
          DISTRIBUTION_ID: ${{ inputs.distribution-id }}
          PREFIX: ${{ steps.coords.outputs.prefix }}
        run: |
          set -euo pipefail
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/${PREFIX}/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation-id=${INV_ID}" >> "$GITHUB_OUTPUT"

      - name: Update sticky PR comment (torn down)
        if: github.event.action == 'closed' && steps.gate.outputs.has-credentials == 'true'
        continue-on-error: true
        shell: bash
        working-directory: '.'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.coords.outputs.preview-url }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          BODY="<!-- preview-env -->
          ## Preview environment

          Preview torn down at ${TIMESTAMP}.

          _The URL \`${PREVIEW_URL}\` is no longer active._"

          EXISTING_ID=$(gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select((.body // "") | startswith("<!-- preview-env -->")) | .id' \
            | head -n1 || true)

          if [ -n "${EXISTING_ID}" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              -X PATCH \
              -f body="${BODY}"
          else
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -X POST \
              -f body="${BODY}"
          fi || echo "::notice title=preview-comment::Could not update PR comment."

      # ------------------------------------------------------------------
      # Step summary (both paths)
      # ------------------------------------------------------------------
      - name: Summarize
        if: always()
        shell: bash
        working-directory: '.'
        env:
          ACTION: ${{ github.event.action }}
          BUCKET: ${{ inputs.bucket-name }}
          PREFIX: ${{ steps.coords.outputs.prefix }}
          PREVIEW_URL: ${{ steps.coords.outputs.preview-url }}
          TEARDOWN_OUTCOME: ${{ steps.teardown.outcome }}
        run: |
          if [ "${ACTION}" = "closed" ]; then
            if [ "${TEARDOWN_OUTCOME}" = "success" ]; then
              echo "### Preview environment torn down" >> "$GITHUB_STEP_SUMMARY"
              echo "- **Prefix removed:** \`s3://${BUCKET}/${PREFIX}/\`" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "### Preview teardown DID NOT COMPLETE (outcome: ${TEARDOWN_OUTCOME})" >> "$GITHUB_STEP_SUMMARY"
              echo "- **Prefix may still exist:** \`s3://${BUCKET}/${PREFIX}/\` — re-run the job or delete manually." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "### Preview environment deployed" >> "$GITHUB_STEP_SUMMARY"
            echo "- **URL:** ${PREVIEW_URL}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Prefix:** \`s3://${BUCKET}/${PREFIX}/\`" >> "$GITHUB_STEP_SUMMARY"
          fi
