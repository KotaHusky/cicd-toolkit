name: Reusable Commitlint

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '24'
    secrets:
      node-auth-token:
        description: 'Token for installing private GitHub Packages (npm) deps. Optional.'
        required: false

concurrency:
  group: commitlint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Lint Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          # Full history so commitlint can compute the merge-base between base
          # and head. A shallow clone breaks `commitlint --from <base> --to <head>`
          # with "Cannot find merge-base ... (shallow clone)" on multi-commit PRs.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.node-auth-token }}

      - name: Run commitlint
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
