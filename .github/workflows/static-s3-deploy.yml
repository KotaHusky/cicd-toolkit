name: Reusable Static Site Deploy (S3 + CloudFront)

on:
  workflow_call:
    inputs:
      bucket-name:
        description: 'S3 bucket that hosts the static site'
        required: true
        type: string
      distribution-id:
        description: 'CloudFront distribution ID for cache invalidation'
        required: true
        type: string
      aws-region:
        description: 'AWS region for the S3 bucket'
        required: false
        type: string
        default: 'us-east-1'
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '24'
      package-manager:
        description: 'Package manager (npm or pnpm)'
        required: false
        type: string
        default: 'npm'
      build-command:
        description: 'Command that produces the static output'
        required: false
        type: string
        default: 'npm run build'
      build-output-dir:
        description: 'Directory of build output to upload (relative to repo root)'
        required: false
        type: string
        default: 'out'
      working-directory:
        description: 'Directory to run the build from'
        required: false
        type: string
        default: '.'
      invalidation-paths:
        description: 'Newline- or space-separated CloudFront paths to invalidate'
        required: false
        type: string
        default: '/*'
      sync-delete:
        description: 'Pass --delete to s3 sync to remove orphaned objects'
        required: false
        type: boolean
        default: true
      cache-control-immutable:
        description: 'Glob (relative to build-output-dir) whose objects get long-cache headers. Empty disables.'
        required: false
        type: string
        default: '_next/static/*'
      build-args:
        description: 'Environment variables to set for the build step (KEY=VALUE per line)'
        required: false
        type: string
        default: ''
      checkout-ref:
        description: 'Git ref to checkout (defaults to triggering ref)'
        required: false
        type: string
        default: ''
      whats-new-path:
        description: >-
          Bake the latest release's whats-new.json into the build at this path
          (relative to working-directory, e.g. public/whats-new.json).
          Empty disables. See the What's-New section of the README.
        required: false
        type: string
        default: ''
      environment:
        description: >-
          GitHub environment name (in the calling repo) to apply to the deploy
          job. Enables environment protection rules (approvals, wait timers) and
          environment-scoped secrets. Requires the caller to pass
          `secrets: inherit`. Empty = no environment.
        required: false
        type: string
        default: ''
      track-deployment:
        description: >-
          Create a GitHub Deployment record (DORA raw data). When true, a
          Deployment is opened before the deploy and a deployment_status of
          success/failure is posted after. Both steps are best-effort
          (continue-on-error: true) so tracking never breaks a deploy.
          Requires the caller's job to have `deployments: write` permission —
          add it to the calling workflow's job permissions block.
        required: false
        type: boolean
        default: false
    secrets:
      role-arn:
        description: 'IAM role ARN for AWS authentication via OIDC'
        required: true
    outputs:
      invalidation-id:
        description: 'CloudFront invalidation ID'
        value: ${{ jobs.deploy.outputs.invalidation-id }}
      objects-uploaded:
        description: 'Number of objects synced to S3 (parsed from aws cli output)'
        value: ${{ jobs.deploy.outputs.objects-uploaded }}

concurrency:
  group: static-s3-${{ inputs.bucket-name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    outputs:
      invalidation-id: ${{ steps.invalidate.outputs.invalidation-id }}
      objects-uploaded: ${{ steps.sync.outputs.objects-uploaded }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      # corepack must run before setup-node: its pnpm cache resolution
      # shells out to `pnpm store path`, which needs the corepack shim.
      - name: Enable corepack (pnpm)
        if: inputs.package-manager == 'pnpm'
        shell: bash
        run: corepack enable
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/${{ inputs.package-manager == 'pnpm' && 'pnpm-lock.yaml' || 'package-lock.json' }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            corepack enable
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Export build environment variables
        if: inputs.build-args != ''
        shell: bash
        run: |
          while IFS= read -r LINE; do
            [ -z "$LINE" ] && continue
            echo "$LINE" >> "$GITHUB_ENV"
          done <<< "${{ inputs.build-args }}"

      - name: Inject what's-new summary
        if: inputs.whats-new-path != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ inputs.whats-new-path }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${TARGET}")"
          if gh release download --repo "${{ github.repository }}" --pattern 'whats-new.json' --output "${TARGET}" --clobber 2>/dev/null; then
            echo "Injected what's-new summary at ${TARGET}"
          else
            echo "::notice title=whats-new::No whats-new.json asset found (note: drafts/prereleases are not considered; this step always bakes the latest release's summary) — skipping injection. The app should handle the file being absent."
          fi

      - name: Build
        shell: bash
        run: ${{ inputs.build-command }}

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Create GitHub Deployment (DORA tracking)
        id: gh-deploy
        if: inputs.track-deployment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_ENV: ${{ inputs.environment || 'production' }}
          DEPLOY_REF: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Callers must grant `deployments: write` on their job; without it
          # this step is skipped gracefully via continue-on-error.
          DEPLOY_ID=$(gh api "repos/${REPO}/deployments" \
            -f ref="${DEPLOY_REF}" \
            -f environment="${DEPLOY_ENV}" \
            -F auto_merge=false \
            -f required_contexts='[]' \
            -f description='Static site deploy started' \
            --jq '.id')
          echo "deployment-id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Deployment tracking::Created GitHub Deployment ${DEPLOY_ID} for ${DEPLOY_ENV}. Requires deployments: write on the calling job."

      - name: Sync build output to S3
        id: sync
        shell: bash
        run: |
          DELETE_FLAG=""
          if [ "${{ inputs.sync-delete }}" = "true" ]; then
            DELETE_FLAG="--delete"
          fi

          # Default short cache for everything (HTML, etc.)
          aws s3 sync "${{ inputs.build-output-dir }}/" "s3://${{ inputs.bucket-name }}/" \
            $DELETE_FLAG \
            --cache-control "public, max-age=60, must-revalidate" \
            | tee /tmp/sync.log

          # Long-cache pass for fingerprinted/immutable assets (Next's _next/static, etc.)
          if [ -n "${{ inputs.cache-control-immutable }}" ] \
             && [ -d "${{ inputs.build-output-dir }}/$(dirname "${{ inputs.cache-control-immutable }}")" ]; then
            aws s3 cp "${{ inputs.build-output-dir }}/$(dirname "${{ inputs.cache-control-immutable }}")" \
              "s3://${{ inputs.bucket-name }}/$(dirname "${{ inputs.cache-control-immutable }}")" \
              --recursive \
              --cache-control "public, max-age=31536000, immutable"
          fi

          # grep exits 1 on no-match; with pipefail+bash5 that propagates through $().
          # Wrap in a group command with `|| true` so the pipeline always exits 0
          # while still counting zero when there are no upload/copy lines.
          COUNT=$({ grep -E '^(upload|copy):' /tmp/sync.log || true; } | wc -l | tr -d ' ')
          echo "objects-uploaded=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Invalidate CloudFront cache
        id: invalidate
        shell: bash
        run: |
          # Convert newline- or space-separated input to a space-joined list.
          # $PATHS is intentionally unquoted so the AWS CLI receives each path
          # as a separate argument (--paths requires multiple positional args).
          # shellcheck disable=SC2086
          PATHS=$(echo "${{ inputs.invalidation-paths }}" | tr '\n' ' ')
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ inputs.distribution-id }}" \
            --paths $PATHS \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation-id=${INV_ID}" >> "$GITHUB_OUTPUT"

      - name: Post GitHub Deployment status (DORA tracking)
        if: always() && inputs.track-deployment && steps.gh-deploy.outputs.deployment-id != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DEPLOY_ID: ${{ steps.gh-deploy.outputs.deployment-id }}
          SYNC_OUTCOME: ${{ steps.sync.outcome }}
          INVALIDATE_OUTCOME: ${{ steps.invalidate.outcome }}
        run: |
          set -euo pipefail
          STATE="failure"
          if [ "${SYNC_OUTCOME}" = "success" ] && [ "${INVALIDATE_OUTCOME}" = "success" ]; then
            STATE="success"
          fi
          gh api "repos/${REPO}/deployments/${DEPLOY_ID}/statuses" \
            -f state="${STATE}" \
            -f description="Static site deploy ${STATE}"
          echo "::notice title=Deployment tracking::Posted deployment_status=${STATE} for deployment ${DEPLOY_ID}."

      - name: Summarize deployment
        shell: bash
        run: |
          echo "### Static site deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Bucket:** \`s3://${{ inputs.bucket-name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Objects synced:** ${{ steps.sync.outputs.objects-uploaded }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Distribution:** \`${{ inputs.distribution-id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Invalidation:** \`${{ steps.invalidate.outputs.invalidation-id }}\`" >> "$GITHUB_STEP_SUMMARY"
