name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Self-contained packages under packages/ carry their own test suites
      # (root vitest only covers test/**) — run each so they gate CI too.
      - name: Run package tests
        shell: bash
        run: |
          set -euo pipefail
          for PKG in packages/*/package.json; do
            [ -e "$PKG" ] || continue
            DIR=$(dirname "$PKG")
            echo "::group::${DIR}"
            # Asset-drift guard: snapshot committed zip content BEFORE npm ci,
            # because the prepare script (node build.mjs) rebuilds them during
            # install — snapshotting after install would always diff clean.
            # Reading from git guarantees we see what was actually committed.
            if compgen -G "$DIR/assets/*.zip" > /dev/null; then
              for Z in "$DIR"/assets/*.zip; do
                TMP_ZIP=$(mktemp /tmp/asset-XXXXXX.zip)
                git show "HEAD:$Z" > "$TMP_ZIP"
                unzip -p "$TMP_ZIP" | shasum -a 256
                rm -f "$TMP_ZIP"
              done > /tmp/assets-committed.txt
            fi
            (cd "$DIR" && npm ci && npm test)
            if [ -f /tmp/assets-committed.txt ]; then
              (cd "$DIR" && npm run build > /dev/null)
              for Z in "$DIR"/assets/*.zip; do unzip -p "$Z" | shasum -a 256; done > /tmp/assets-rebuilt.txt
              diff /tmp/assets-committed.txt /tmp/assets-rebuilt.txt \
                || { echo "::error title=asset-drift::Committed Lambda zips in $DIR/assets don't match a fresh build — run npm run build there and commit the zips."; exit 1; }
              rm -f /tmp/assets-committed.txt /tmp/assets-rebuilt.txt
            fi
            echo "::endgroup::"
          done

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/

      - name: Run actionlint
        # -ignore 'shellcheck' suppresses shellcheck-via-actionlint findings.
        # Shellcheck runs separately on composite action scripts (./actions/)
        # where it is more useful. Inline workflow run: scripts contain ${{ }}
        # expressions that shellcheck cannot parse and flags as noise.
        run: actionlint -color -ignore 'shellcheck reported issue'

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Run ShellCheck on composite action scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: './actions'
          severity: warning
